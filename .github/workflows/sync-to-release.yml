name: Sync to upstream release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SYNC_BRANCH: sync/latest

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare release files
        run: |
          mkdir -p /tmp/release-staging
          cp -a . /tmp/release-staging/
          cd /tmp/release-staging
          rm -rf .git .github

          rm -rf tests/ evals/ mine-workspace/ __pycache__/
          rm -f example-worker.py pyproject.toml requirements-dev.txt .skillignore

          rm -f docs/frontend-skill-development-guide-en.md
          rm -f docs/SCHEMA_LAYERING_4PLATFORMS.md
          rm -f docs/Subnet_protocol_v2.0.md
          rm -f docs/FIELD_ALIGNMENT_GUIDE.md
          rm -f docs/OPENCLAW_HOST_INTEGRATION.md

          find . -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find . -name '*.pyc' -delete 2>/dev/null || true

          echo "Release files: $(find . -type f | wc -l)"

      - name: Get source commit info
        id: source
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha_full=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Sync to fork and manage PR
        env:
          GH_TOKEN: ${{ secrets.FORK_PAT }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          SOURCE_SHA_FULL: ${{ steps.source.outputs.sha_full }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::FORK_PAT secret not configured. Skipping sync."
            exit 0
          fi

          # Clone the fork
          cd /tmp
          rm -rf pr-repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/data4agent/mine-skill.git" pr-repo
          cd pr-repo

          git remote add upstream https://github.com/awp-worknet/mine-skill.git
          git fetch upstream main

          # Create or reset the fixed sync branch from upstream/main
          git checkout -B "$SYNC_BRANCH" upstream/main

          # Replace all files with release staging
          git rm -rf . > /dev/null 2>&1 || true
          cp -a /tmp/release-staging/. ./

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "sync: update from data4agent/mine-skill main@${SOURCE_SHA}"
          git push origin "$SYNC_BRANCH" --force

          # Check if an open PR already exists for this branch
          EXISTING=$(gh pr list --repo awp-worknet/mine-skill --head "data4agent:${SYNC_BRANCH}" --state open --json number,url -q '.[0]' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            PR_NUM=$(echo "$EXISTING" | jq -r '.number')
            # Add a comment noting the update
            gh pr comment "$PR_NUM" --repo awp-worknet/mine-skill \
              --body "Updated to [data4agent/mine-skill@\`${SOURCE_SHA}\`](https://github.com/data4agent/mine-skill/commit/${SOURCE_SHA_FULL})."
            echo "Updated existing PR #${PR_NUM}"
          else
            # Create new PR
            gh pr create \
              --repo awp-worknet/mine-skill \
              --base main \
              --head "data4agent:${SYNC_BRANCH}" \
              --title "sync: latest from data4agent/mine-skill" \
              --body "Automated sync from [data4agent/mine-skill](https://github.com/data4agent/mine-skill).

          Latest: [\`${SOURCE_SHA}\`](https://github.com/data4agent/mine-skill/commit/${SOURCE_SHA_FULL})

          Excludes dev-only files: tests/, evals/, mine-workspace/, example-worker.py, pyproject.toml, dev docs."
            echo "Created new PR"
          fi
