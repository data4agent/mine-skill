name: Sync to upstream release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release files
        run: |
          mkdir -p /tmp/release-staging
          cp -a . /tmp/release-staging/
          cd /tmp/release-staging
          rm -rf .git .github

          # Remove dev-only files
          rm -rf tests/ evals/ mine-workspace/ __pycache__/
          rm -f example-worker.py pyproject.toml requirements-dev.txt .skillignore

          # Remove dev-only docs
          rm -f docs/frontend-skill-development-guide-en.md
          rm -f docs/SCHEMA_LAYERING_4PLATFORMS.md
          rm -f docs/Subnet_protocol_v2.0.md
          rm -f docs/FIELD_ALIGNMENT_GUIDE.md
          rm -f docs/OPENCLAW_HOST_INTEGRATION.md

          find . -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find . -name '*.pyc' -delete 2>/dev/null || true

          echo "Release files: $(find . -type f | wc -l)"

      - name: Get source commit info
        id: source
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha_full=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.FORK_PAT }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          EXISTING=$(gh pr list --repo awp-worknet/mine-skill --head "data4agent:sync/${SOURCE_SHA}" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR #${EXISTING} already exists, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch to origin (data4agent/mine-skill)
        if: steps.check_pr.outputs.skip != 'true'
        id: sync
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          BRANCH="sync/${SOURCE_SHA}"

          # Create a temp repo with only release files
          cd /tmp
          rm -rf pr-repo
          git init pr-repo -b "$BRANCH"
          cd pr-repo

          cp -a /tmp/release-staging/. ./

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes"
            exit 0
          fi

          git commit -m "sync: update from data4agent/mine-skill main@${SOURCE_SHA}"

          git remote add origin "https://x-access-token:${{ secrets.FORK_PAT }}@github.com/data4agent/mine-skill.git"
          git push origin "$BRANCH" --force

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create PR to upstream
        if: steps.check_pr.outputs.skip != 'true' && steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.FORK_PAT }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          SOURCE_SHA_FULL: ${{ steps.source.outputs.sha_full }}
          BRANCH: ${{ steps.sync.outputs.branch }}
        run: |
          gh pr create \
            --repo awp-worknet/mine-skill \
            --base main \
            --head "data4agent:${BRANCH}" \
            --title "sync: update @${SOURCE_SHA}" \
            --body "Automated sync from [data4agent/mine-skill@\`${SOURCE_SHA}\`](https://github.com/data4agent/mine-skill/commit/${SOURCE_SHA_FULL}).

          Excludes dev-only files: tests/, evals/, mine-workspace/, example-worker.py, pyproject.toml, dev docs."
