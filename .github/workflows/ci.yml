name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: |
          ruff check . --select=E,W --ignore=E501 || true
          echo "Lint check complete (warnings allowed)"

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core dependencies
        run: pip install -r requirements-core.txt

      - name: Verify imports
        run: |
          python -c "from scripts.run_tool import main; print('run_tool OK')"
          python -c "from crawler.schema_contract import get_schema_contract; print('schema_contract OK')"
          echo "Import validation passed"
        env:
          PYTHONPATH: .
