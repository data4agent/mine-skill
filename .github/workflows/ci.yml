name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-core.txt
          pip install -r requirements-dev.txt

      - name: Run tests (unit tests only)
        run: |
          pytest tests/ -q --tb=short \
            --ignore=tests/test_pow_solver.py \
            --ignore=tests/test_platform_signing.py \
            -k "not (test_fetch or test_playwright or test_camoufox or test_crawl4ai)"
        env:
          PYTHONPATH: .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check . --select=E,F,W --ignore=E501
